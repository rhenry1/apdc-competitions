<!DOCTYPE html>
<html lang="en" style="background:#06041a;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06041a">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>APDC Competitions</title>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/pwa.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Inter:wght@200;300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #06041a !important; }

  body {
    background: #06041a;
    color: #f0ebff;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: max(60px, env(safe-area-inset-bottom));
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 120% 55% at -10% 0%,  rgba(109,40,217,0.32) 0%, transparent 55%),
      radial-gradient(ellipse 80%  45% at 110% 35%, rgba(76,29,149,0.22)  0%, transparent 55%),
      radial-gradient(ellipse 70%  40% at 50% 110%, rgba(109,40,217,0.15) 0%, transparent 50%);
    pointer-events: none;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 620px; margin: 0 auto; padding: 0 28px;
  }

  /* ── HEADER ── */
  .header {
    padding-top: max(64px, env(safe-area-inset-top));
    padding-bottom: 60px;
  }

  .overline {
    font-size: 9px; font-weight: 500; letter-spacing: 0.32em;
    text-transform: uppercase; color: rgba(196,181,253,0.4);
    margin-bottom: 22px; display: flex; align-items: center; gap: 16px;
  }
  .overline::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(233,196,106,0.2), rgba(196,181,253,0.1), transparent);
  }

  /* APDC — Tenor Sans, purple-to-violet gradient */
  .masthead {
    font-family: 'Tenor Sans', serif;
    font-size: clamp(72px, 20vw, 140px);
    font-weight: 400;
    letter-spacing: 0.06em;
    line-height: 0.9;
    margin-left: -2px;
    margin-bottom: 8px;
    background: linear-gradient(125deg,
      #4c1d95 0%,
      #7c3aed 30%,
      #c084fc 60%,
      #e9d5ff 80%,
      #fde68a 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 36px rgba(124,58,237,0.3));
  }

  /* Animated gold rule */
  .masthead-rule {
    width: 0; height: 1px;
    background: linear-gradient(90deg, rgba(233,196,106,0.7), rgba(233,196,106,0.2), transparent);
    margin-bottom: 16px;
    animation: drawRule 1.4s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
  }
  @keyframes drawRule { to { width: 100%; } }

  .studio-name {
    font-family: 'Inter', sans-serif;
    font-size: 9px; font-weight: 400; letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(196,181,253,0.5);
    margin-bottom: 32px;
  }

  /* Competition Schedule — Tenor Sans, clean */
  .header-title {
    font-family: 'Tenor Sans', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #e0d4ff;
    line-height: 1.2;
  }

  /* ── SEASON SECTION ── */
  .season-block { padding-top: 48px; }

  .season-label {
    display: flex; align-items: center; gap: 16px; margin-bottom: 0;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s;
  }
  .season-year {
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(196,181,253,0.38); white-space: nowrap;
  }
  .season-rule { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

  /* ── COMPETITION ROWS ── */
  .comp-row {
    display: block; text-decoration: none; color: inherit;
    padding: 28px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative; opacity: 0; animation: fadeUp 0.7s ease forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .comp-row:first-of-type { border-top: 1px solid rgba(255,255,255,0.05); }

  .comp-row::before {
    content: ''; position: absolute; left: -28px; top: 0; bottom: 0; width: 2px;
  }
  .comp-row.nationals-row::before {
    background: linear-gradient(180deg, #fde68a 0%, #c084fc 100%);
    opacity: 1;
  }
  .comp-row.regional-row::before {
    background: linear-gradient(180deg, #a5b4fc 0%, #818cf8 100%);
    opacity: 1;
  }
  .comp-row.soon::before { opacity: 0.2; }
  .comp-row:not(.soon):active { opacity: 0.75; }

  /* Past/completed events are de-emphasized so the upcoming season stays the focus */
  .comp-row.completed::before { background: rgba(255,255,255,0.18) !important; opacity: 1; }
  .comp-row.completed:not(.soon) .comp-type { color: rgba(255,255,255,0.35); }
  .comp-row.completed .comp-index { color: rgba(255,255,255,0.15); }

  .comp-inner {
    display: grid; grid-template-columns: 36px 1fr auto;
    gap: 0 18px; align-items: center;
  }

  .comp-index {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: rgba(196,181,253,0.2); letter-spacing: 0.05em;
    align-self: start; padding-top: 4px;
  }
  .comp-row.nationals-row:not(.soon) .comp-index { color: rgba(253,230,138,0.35); }

  .comp-body { min-width: 0; }

  .comp-type {
    font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 7px;
    color: rgba(196,181,253,0.45);
  }
  .comp-row.nationals-row:not(.soon) .comp-type { color: rgba(253,230,138,0.7); }
  .comp-row.soon .comp-type { color: rgba(255,255,255,0.15); }

  .comp-name {
    font-family: 'Tenor Sans', serif;
    font-size: clamp(20px, 4.5vw, 26px);
    font-weight: 400; letter-spacing: 0.02em;
    color: #ffffff; line-height: 1.15; margin-bottom: 9px;
  }
  .comp-row.soon .comp-name { color: rgba(255,255,255,0.28); }
  .comp-row.completed .comp-name { color: rgba(240,235,255,0.7); }

  .comp-details {
    display: flex; flex-wrap: wrap; gap: 3px 18px;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
    color: rgba(255,255,255,0.3); letter-spacing: 0.02em;
  }
  .comp-row.nationals-row:not(.soon) .comp-details { color: rgba(255,255,255,0.45); }
  .comp-row.soon .comp-details { color: rgba(255,255,255,0.1); }

  .map-link {
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: none; padding: 0; margin: 0;
    font: inherit; color: inherit; letter-spacing: inherit;
    cursor: pointer; text-decoration: none;
    transition: color 0.15s;
  }
  .map-link:hover, .map-link:focus-visible { color: #c4b5fd; text-decoration: underline; }

  .comp-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 10px; flex-shrink: 0;
  }

  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(74,222,128,0.5); }
    70%  { box-shadow: 0 0 0 7px rgba(74,222,128,0);   }
    100% { box-shadow: 0 0 0 0   rgba(74,222,128,0);   }
  }

  .arrow {
    font-size: 22px; color: rgba(255,255,255,0.18);
    transition: color 0.2s, transform 0.2s; line-height: 1;
  }
  .comp-row:not(.soon):hover .arrow {
    color: rgba(255,255,255,0.55); transform: translateX(4px);
  }

  .soon-label {
    font-family: 'DM Mono', monospace; font-size: 8px;
    letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.12);
  }

  .comp-row:nth-child(1) { animation-delay: 0.55s; }
  .comp-row:nth-child(2) { animation-delay: 0.63s; }
  .comp-row:nth-child(3) { animation-delay: 0.71s; }
  .comp-row:nth-child(4) { animation-delay: 0.79s; }
  .comp-row:nth-child(5) { animation-delay: 0.87s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .season-gap { height: 44px; }

  footer {
    padding: 64px 0 20px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; color: rgba(255,255,255,0.07);
  }

  /* ── COMPLETED STATE ── */
  .completed-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
  }
  .completed-check {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    color: rgba(255,255,255,0.55);
  }

  /* ── NEXT-COMPETITION HERO ── */
  .next-hero {
    display: block; text-decoration: none; color: inherit;
    position: relative; overflow: hidden;
    margin: 8px 0 4px;
    padding: 26px 24px 24px;
    border-radius: 20px;
    border: 1px solid rgba(196,181,253,0.14);
    background:
      linear-gradient(155deg, rgba(124,58,237,0.16) 0%, rgba(76,29,149,0.05) 55%, rgba(255,255,255,0.02) 100%);
    box-shadow: 0 18px 48px -28px rgba(124,58,237,0.7);
    -webkit-tap-highlight-color: transparent;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.45s;
  }
  .next-hero::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, #a5b4fc 0%, #818cf8 100%);
  }
  .next-hero.accent-nationals::before {
    background: linear-gradient(180deg, #fde68a 0%, #c084fc 100%);
  }
  .next-hero:active { transform: translateY(1px); }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(196,181,253,0.7); margin-bottom: 14px;
  }
  .hero-eyebrow .hero-live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
    animation: pulse 2.2s ease-in-out infinite;
  }
  .hero-type {
    font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(196,181,253,0.5); margin-bottom: 6px;
  }
  .next-hero.accent-nationals .hero-type { color: rgba(253,230,138,0.75); }
  .hero-name {
    font-family: 'Tenor Sans', serif; font-weight: 400;
    font-size: clamp(24px, 6vw, 34px); letter-spacing: 0.01em;
    line-height: 1.12; color: #fff; margin-bottom: 12px;
  }
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 4px 16px;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300;
    color: rgba(255,255,255,0.5); margin-bottom: 20px;
  }
  .hero-meta .map-link { color: rgba(255,255,255,0.5); }

  .hero-foot {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  }
  .hero-countdown { display: flex; align-items: baseline; gap: 8px; }
  .hero-days {
    font-family: 'Tenor Sans', serif; font-size: 40px; line-height: 0.9;
    color: #e0d4ff;
  }
  .hero-days-label {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300;
    letter-spacing: 0.06em; text-transform: uppercase; color: rgba(196,181,253,0.55);
  }
  .hero-weekend {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 0.02em; color: #d8b4fe;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.03em; color: rgba(255,255,255,0.55);
  }
  .next-hero:hover .hero-cta { color: #fff; }
  .hero-cta .arrow { font-size: 18px; }

  /* ── COLLAPSIBLE PAST SEASON ── */
  .past-toggle {
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(196,181,253,0.5); background: none; border: none;
    padding: 4px 2px; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .past-toggle:hover, .past-toggle:focus-visible { color: #c4b5fd; }
  .past-toggle .chev {
    display: inline-block; transition: transform 0.2s ease;
    font-size: 12px; line-height: 1;
  }
  .past-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .past-rows[hidden] { display: none; }
  /* Past rows are revealed on demand, not on load — no entrance fade (and a
     display:none animate-in would otherwise sit at opacity:0 until expanded). */
  .past-rows .comp-row { opacity: 1; animation: none; }
</style>
</head>

<script>
  // ── Data-driven dashboard: next-competition hero + season lists ──
  // Tests may pin "today" via window.__APDC_NOW so the countdown is deterministic.
  function apdcNow() {
    return window.__APDC_NOW ? new Date(window.__APDC_NOW) : new Date();
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function accentClass(c) { return c.accent === 'nationals' ? 'accent-nationals' : 'accent-regional'; }
  function rowAccent(c) { return c.accent === 'nationals' ? 'nationals-row' : 'regional-row'; }
  function addr(c) { return [c.city, c.state].filter(Boolean).join(', '); }

  function heroHtml(c, now) {
    const ph = APDCComps.phase(c, now);
    let foot;
    if (ph === 'during') {
      foot =
        '<div class="hero-weekend"><span class="hero-live-dot"></span>Competition Weekend</div>' +
        '<span class="hero-cta">View schedule <span class="arrow">&rsaquo;</span></span>';
    } else {
      const d = APDCComps.daysUntil(c, now);
      const label = d === 1 ? 'day to go' : 'days to go';
      foot =
        '<div class="hero-countdown"><span class="hero-days">' + d + '</span>' +
        '<span class="hero-days-label">' + label + '</span></div>' +
        '<span class="hero-cta">View schedule <span class="arrow">&rsaquo;</span></span>';
    }
    const eyebrow = ph === 'during'
      ? '<span class="hero-eyebrow"><span class="hero-live-dot"></span>Happening this weekend</span>'
      : '<span class="hero-eyebrow">Next Competition</span>';
    const a = addr(c);
    return (
      '<a class="next-hero ' + accentClass(c) + '" href="' + esc(c.url) + '" aria-labelledby="next-hero-title">' +
        eyebrow +
        '<div class="hero-type">' + esc(c.type) + '</div>' +
        '<h2 class="hero-name" id="next-hero-title">' + esc(c.name) + '</h2>' +
        '<div class="hero-meta"><span>' + esc(c.dates) + '</span>' +
          (a ? '<button type="button" class="map-link" data-address="' + esc(a) + '"></button>' : '') +
        '</div>' +
        '<div class="hero-foot">' + foot + '</div>' +
      '</a>'
    );
  }

  function seasonLabelHtml(label) {
    return '<div class="season-label"><span class="season-year">' + esc(label) + '</span>' +
           '<div class="season-rule"></div></div>';
  }

  function rowHtml(c, index, opts) {
    opts = opts || {};
    const a = addr(c);
    const details = opts.completed
      ? '<button type="button" class="map-link" data-address="' + esc(a) + '"></button>' +
        '<span>' + esc(c.dates) + '</span>'
      : '<span>' + esc(c.dates) + (a ? ' · ' + esc(a) : '') + '</span>';
    const badge = opts.completed
      ? '<div class="completed-badge" style="margin-top:12px;">' +
        '<span class="completed-check"></span> Completed</div>'
      : '';
    const right = '<div class="comp-right"><div class="arrow">&rsaquo;</div></div>';
    return (
      '<a class="comp-row ' + rowAccent(c) + (opts.completed ? ' completed' : '') + '" href="' + esc(c.url) + '">' +
        '<div class="comp-inner"><div class="comp-index">' + index + '</div>' +
          '<div class="comp-body"><div class="comp-type">' + esc(c.type) + '</div>' +
            '<div class="comp-name">' + esc(c.name) + '</div>' +
            '<div class="comp-details">' + details + '</div>' + badge +
          '</div>' + right +
        '</div>' +
      '</a>'
    );
  }

  function groupBySeason(list) {
    const groups = [];
    list.forEach(c => {
      let g = groups.find(x => x.label === c.seasonLabel);
      if (!g) { g = { label: c.seasonLabel, comps: [] }; groups.push(g); }
      g.comps.push(c);
    });
    return groups;
  }

  function renderDashboard() {
    const now = apdcNow();
    const heroComp = APDCComps.next(now);
    let html = '';
    let idx = 0;

    // Upcoming (and in-progress) seasons — the global "next" comp is the hero.
    groupBySeason(APDCComps.upcoming(now)).forEach(g => {
      html += '<div class="season-block">' + seasonLabelHtml(g.label);
      g.comps.forEach(c => {
        if (c === heroComp) html += heroHtml(c, now);
        else html += rowHtml(c, String(++idx).padStart(2, '0'));
      });
      html += '</div>';
    });

    // Past seasons — collapsible, de-emphasized.
    const pastGroups = groupBySeason(APDCComps.past(now));
    pastGroups.forEach(g => {
      const rows = g.comps.map(c => rowHtml(c, '00', { completed: true })).join('');
      html +=
        '<div class="season-block past-block">' +
          '<div class="season-label">' +
            '<span class="season-year">' + esc(g.label) + ' · Past</span>' +
            '<button type="button" class="past-toggle" aria-expanded="false" aria-controls="past-rows">' +
              '<span class="past-toggle-text">Show</span><span class="chev">&#8964;</span>' +
            '</button>' +
            '<div class="season-rule"></div>' +
          '</div>' +
          '<div class="past-rows" id="past-rows" hidden>' + rows + '</div>' +
        '</div>';
    });

    document.getElementById('seasons').innerHTML = html;

    // Icons + collapse wiring for the freshly rendered nodes.
    const firstCheck = document.querySelector('.completed-check');
    if (firstCheck) firstCheck.id = 'completed-check';
    document.querySelectorAll('.completed-check').forEach(el => { el.innerHTML = ICONS.check; });
    const toggle = document.querySelector('.past-toggle');
    if (toggle) {
      const rows = document.getElementById('past-rows');
      const txt = toggle.querySelector('.past-toggle-text');
      toggle.addEventListener('click', () => {
        const open = rows.hasAttribute('hidden');
        if (open) { rows.removeAttribute('hidden'); toggle.setAttribute('aria-expanded', 'true'); txt.textContent = 'Hide'; }
        else { rows.setAttribute('hidden', ''); toggle.setAttribute('aria-expanded', 'false'); txt.textContent = 'Show'; }
      });
    }
    wireMapLinks();
  }

  function wireMapLinks() {
    document.querySelectorAll('.map-link').forEach(btn => {
      if (btn.dataset.wired) return;
      btn.dataset.wired = '1';
      const address = btn.dataset.address;
      btn.innerHTML = ICONS.pin + address;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address), '_blank', 'noopener');
      });
    });
  }

  renderDashboard();

  window.addEventListener('DOMContentLoaded', () => {
    const btnWrap  = document.getElementById('install-btn-wrap');
    const btnMain  = document.getElementById('install-btn-main');
    const iosPanel = document.getElementById('ios-instructions');

    if (APDCPwa.isStandalone()) { btnWrap.style.display = 'none'; return; }

    const info = APDCPwa.installInstructions();
    if (!info) { btnWrap.style.display = 'none'; return; } // no install path on this browser

    // The default 3-step panel markup matches Safari's real flow exactly;
    // every other browser gets a single tailored instruction instead.
    if (!(APDCPwa.isIOS() && APDCPwa.isSafari())) {
      iosPanel.innerHTML = '<div class="ios-step"><div>' + info.html + '</div></div>';
    }

    btnMain.addEventListener('click', async () => {
      const deferredPrompt = APDCPwa.getDeferredPrompt();
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        APDCPwa.clearDeferredPrompt();
        if (outcome === 'accepted') { btnWrap.style.display = 'none'; APDCPwa.markDismissed(); }
        return;
      }
      const open = !iosPanel.classList.contains('visible');
      if (open) {
        iosPanel.style.display = 'block';
        requestAnimationFrame(() => iosPanel.classList.add('visible'));
        btnMain.textContent = 'Dismiss';
      } else {
        iosPanel.classList.remove('visible');
        setTimeout(() => { iosPanel.style.display = 'none'; }, 300);
        btnMain.textContent = 'Add to Home Screen';
      }
    });

    APDCPwa.initServiceWorker('service-worker.js');
  });
</script>

<div class="install-banner hidden" id="install-banner">
  <div class="banner-icon" id="banner-icon"></div>
  <div class="banner-text">
    <div class="banner-title">Add to Home Screen</div>
    <div class="banner-body" id="banner-body"></div>
    <div class="banner-actions">
      <button class="banner-btn-install" id="banner-install" style="display:none">Install App</button>
      <button class="banner-btn-dismiss" id="banner-dismiss">Maybe later</button>
    </div>
  </div>
  <button class="banner-close" id="banner-close" aria-label="Close"></button>
</div>

</body>
